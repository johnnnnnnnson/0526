<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新北市 YouBike 2.0 即時監測儀表板</title>
  
  <!-- p5.js 核心庫 (1.9.0) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  
  <!-- 引入 Leaflet 地圖引擎 (解決 Mappa 在 file:// 環境下的載入崩潰問題) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- 引入 Mappa.js (mappa-mundi) -->
  <script src="https://cdn.jsdelivr.net/npm/mappa-mundi@0.0.5/dist/mappa.min.js"></script>

  <!-- 引入 Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: rgb(11, 14, 23); /* 對齊 Canvas 背景，避免閃爍 */
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <!-- 載入你同目錄下的 JavaScript 檔案 -->
  <script src="sketch.js"></script>
</body>
</html>
